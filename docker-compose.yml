name: taskFlow

services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - taskflow
    ports:
      - "5000:5000"
    

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./frontend/.env
    environment:
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=500
      - WDS_SOCKET_PORT=3000
      - HOST=0.0.0.0
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - taskflow
    ports:
      - 3000:3000
    command: npm start
    depends_on:
      - api
volumes:
  mongo_data:
networks:
  taskflow:
    driver: bridge